<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    .pdf-wrapper {
      width: 100%;
      height: 100%;
    }
    .pdf-wrapper embed {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div class="pdf-wrapper">
    <embed src="suqing-yueyan.pdf" type="application/pdf" width="100%" height="100%">
  </div>

</body>
</html>
